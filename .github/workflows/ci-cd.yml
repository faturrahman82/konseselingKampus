name: UniCounsel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unicounsel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint report
        shell: bash
        run: npm run lint > lint-report.txt 2>&1 || true
      - name: Upload lint report
        uses: actions/upload-artifact@v5
        with:
          name: frontend-lint-report
          path: frontend/lint-report.txt
          retention-days: 7
      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:5000/api
        run: npm run build
      - name: Upload frontend build
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Build backend
        run: npm run build
      - name: Validate Prisma schema
        env:
          DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/unicounsel_ci
        run: npx prisma validate
      - name: Run backend tests
        if: ${{ hashFiles('backend/test/**/*.js') != '' }}
        env:
          NODE_ENV: test
          JWT_SECRET: ci-only-jwt-secret
          DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/unicounsel_ci
          CORS_ORIGINS: http://localhost:5173
        run: npm run test
      - name: Report missing backend tests
        if: ${{ hashFiles('backend/test/**/*.js') == '' }}
        run: echo "::notice::Backend test belum tersedia di repository. Build dan validasi Prisma tetap berhasil."
